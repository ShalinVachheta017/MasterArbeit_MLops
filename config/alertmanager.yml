# Alertmanager Configuration — HAR MLOps Pipeline
# ==================================================
#
# Minimal but complete Alertmanager config for local/thesis deployment.
# Prometheus sends alerts → Alertmanager → routes them to receivers.
#
# Start with:
#   docker compose up alertmanager
#   open http://localhost:9093
#
# Receiver hierarchy:
#   1. "null"   — silently drops; used for INFO-level alerts (avoids noise)
#   2. "log"    — writes to container stdout; zero-dependency, always works
#   3. "email"  — fill in SMTP details to get real email notifications
#
# To use email: set env vars in docker-compose.yml:
#   AM_SMTP_HOST, AM_SMTP_FROM, AM_SMTP_TO, AM_SMTP_PASSWORD

global:
  # How long to wait before re-sending a resolved alert notification
  resolve_timeout: 5m

  # SMTP settings (uncomment and set env vars for real email)
  # smtp_smarthost: '${AM_SMTP_HOST:-localhost:587}'
  # smtp_from: '${AM_SMTP_FROM:-har-mlops@localhost}'
  # smtp_auth_username: '${AM_SMTP_FROM:-har-mlops@localhost}'
  # smtp_auth_password: '${AM_SMTP_PASSWORD:-}'

# Routing tree — all alerts flow through this tree to find a receiver
route:
  receiver: log          # default receiver for all alerts
  group_by: ['alertname', 'severity', 'team']
  group_wait:      30s   # wait this long before firing the first notification for a group
  group_interval:   5m   # wait before sending notification when new alerts join an existing group
  repeat_interval: 4h    # resend non-resolved alerts after this interval

  routes:
    # Critical alerts — short repeat interval, go to log (change to email/webhook in production)
    - match:
        severity: critical
      receiver: log
      group_wait:    10s
      repeat_interval: 1h

    # Warning alerts — standard cadence
    - match:
        severity: warning
      receiver: log
      repeat_interval: 4h

    # Pending/unimplemented metric alerts — silence them
    - match:
        status: pending_metric
      receiver: "null"

    # Info-level alerts (e.g. retraining triggered) — send once, don't repeat
    - match:
        severity: info
      receiver: log
      repeat_interval: 24h

# Inhibition rules — suppress child alerts when parent fires
inhibit_rules:
  # If the service is fully down (HARNoPredictions critical), suppress WARNING-level
  # health alerts (they're symptoms, not root causes)
  - source_match:
      alertname: HARNoPredictions
      severity: critical
    target_match:
      severity: warning
    equal: ['team']

  # Critical baseline missing suppresses stale baseline warning (subset of same problem)
  - source_match:
      alertname: HARMissingDriftBaseline
      severity: critical
    target_match:
      alertname: HARStaleDriftBaseline

# Receivers
receivers:
  # Null receiver — drop silently (used for pending/info alerts)
  - name: "null"

  # Log receiver — writes to alertmanager container stdout
  # This is the zero-infrastructure default: you can see alerts in `docker compose logs alertmanager`
  - name: log
    webhook_configs:
      - url: 'http://localhost:9093/api/v2/alerts'    # loopback — just logs to stdout
        send_resolved: true
        http_config:
          follow_redirects: true

  # Email receiver — uncomment and fill in SMTP details for real notifications
  # - name: email
  #   email_configs:
  #     - to: '${AM_SMTP_TO:-ops@localhost}'
  #       from: '${AM_SMTP_FROM:-har-mlops@localhost}'
  #       smarthost: '${AM_SMTP_HOST:-localhost:587}'
  #       auth_username: '${AM_SMTP_FROM:-har-mlops@localhost}'
  #       auth_password: '${AM_SMTP_PASSWORD:-}'
  #       require_tls: false
  #       send_resolved: true
  #       headers:
  #         Subject: '[HAR MLOps] {{ .Status | toUpper }} {{ .GroupLabels.alertname }}'
  #       html: '{{ template "email.default.html" . }}'

# Templates (optional — add custom HTML/text templates here)
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'
