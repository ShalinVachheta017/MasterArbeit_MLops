# HAR Pipeline Alert Rules — PENDING (metrics not yet exported)
# ==============================================================
#
# ╔══════════════════════════════════════════════════════════════════════╗
# ║  THESE RULES WILL NOT FIRE because the referenced metrics are      ║
# ║  NOT currently exported by src/api/app.py.                         ║
# ║                                                                     ║
# ║  Each rule is annotated with what needs to be added to app.py      ║
# ║  (or a batch monitoring script) before it becomes live.            ║
# ║                                                                     ║
# ║  To activate: implement the metric, add this file to               ║
# ║  prometheus.yml rule_files, and run `kubectl apply` or             ║
# ║  `docker compose restart prometheus`.                               ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# This file is NOT loaded by prometheus.yml until metrics are implemented.
# It is kept for planning / sprint backlog purposes.
#
# Implementation priority order:
#   P1 — har_model_f1_score, har_model_accuracy (Stage 5 evaluation logging)
#   P1 — har_trigger_state (expose TriggerEvaluationArtifact.action as gauge)
#   P2 — har_drift_psi, har_drift_ks_stat (Stage 12 Wasserstein component)
#   P3 — har_ood_ratio (optional OOD detection layer)
#   P3 — har_consecutive_warnings (sliding window counter in app.py)
#   P3 — har_batch_processing_seconds (training/batch job histogram)

groups:

  # --------------------------------------------------------------------------
  # IMPLEMENT: add to Stage 5 evaluation → app.py or a scrape endpoint
  #   _prom_model_f1    = Gauge("har_model_f1_score", "Latest F1 score from Stage 5 eval")
  #   _prom_model_acc   = Gauge("har_model_accuracy", "Latest accuracy from Stage 5 eval")
  # --------------------------------------------------------------------------
  - name: har_model_quality_pending
    interval: 5m
    rules:
      # DEAD: har_model_f1_score not exported
      - alert: HARF1ScoreDropped__PENDING
        expr: har_model_f1_score < 0.85
        for: 10m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] HAR model F1 score dropped"
          description: "Requires har_model_f1_score Gauge. Implement: log eval artifact to Prometheus after Stage 5."

      # DEAD: har_model_accuracy not exported
      - alert: HARAccuracyDropped__PENDING
        expr: har_model_accuracy < 0.80
        for: 10m
        labels:
          severity: critical
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] HAR model accuracy critically low"
          description: "Requires har_model_accuracy Gauge. Implement: log eval artifact to Prometheus after Stage 5."

  # --------------------------------------------------------------------------
  # IMPLEMENT: expose TriggerEvaluationArtifact.action enum as Gauge in app.py
  #   action encoding: NONE=0, MONITOR=1, QUEUE_RETRAIN=2, TRIGGER_RETRAIN=3, ROLLBACK=4
  #   _prom_trigger_state = Gauge("har_trigger_state", "...", ["trigger_type"])
  # --------------------------------------------------------------------------
  - name: har_trigger_policy_pending
    interval: 30s
    rules:
      # DEAD: har_trigger_state not exported
      - alert: HARRetrainingTriggered__PENDING
        expr: har_trigger_state{trigger_type="overall"} == 2
        labels:
          severity: info
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] HAR model retraining triggered"
          description: "Requires har_trigger_state Gauge with trigger_type label. Implement in Stage 7 or a monitoring endpoint."

      # DEAD: har_consecutive_warnings not exported
      - alert: HARConsecutiveWarnings__PENDING
        expr: har_consecutive_warnings >= 3
        for: 1m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] Multiple consecutive monitoring warnings"
          description: "Requires har_consecutive_warnings Counter/Gauge. Implement: rolling window in _run_monitoring()."

  # --------------------------------------------------------------------------
  # IMPLEMENT: Stage 12 (WassersteinDriftComponent) can export per-feature stats
  #   _prom_drift_psi    = Gauge("har_drift_psi", "PSI score", ["feature"])
  #   _prom_drift_ks     = Gauge("har_drift_ks_stat", "KS statistic", ["feature"])
  # --------------------------------------------------------------------------
  - name: har_advanced_drift_pending
    interval: 1m
    rules:
      # DEAD: har_drift_psi not exported (Stage 12 metric)
      - alert: HARFeatureDrift__PENDING
        expr: har_drift_psi > 0.25
        for: 5m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] Feature PSI drift: {{ $labels.feature }}"
          description: "Requires har_drift_psi Gauge[feature]. Implement: export from Stage 12 WassersteinDriftComponent."

      # DEAD: har_drift_ks_stat not exported (Stage 12 metric)
      - alert: HARDistributionShift__PENDING
        expr: har_drift_ks_stat > 0.1
        for: 5m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] KS distribution shift: {{ $labels.feature }}"
          description: "Requires har_drift_ks_stat Gauge[feature]. Implement: export from Stage 12 WassersteinDriftComponent."

  # --------------------------------------------------------------------------
  # IMPLEMENT: optional OOD detection extension
  #   _prom_ood_ratio = Gauge("har_ood_ratio", "Fraction of OOD samples in last batch")
  # --------------------------------------------------------------------------
  - name: har_ood_pending
    interval: 1m
    rules:
      # DEAD: har_ood_ratio not exported
      - alert: HARHighOODRatio__PENDING
        expr: har_ood_ratio > 0.2
        for: 10m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] High OOD sample ratio"
          description: "Requires har_ood_ratio Gauge. Implement: add Mahalanobis/energy OOD scorer to Layer 1."

      - alert: HARCriticalOOD__PENDING
        expr: har_ood_ratio > 0.4
        for: 5m
        labels:
          severity: critical
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] Critical OOD ratio — model unreliable"
          description: "Requires har_ood_ratio Gauge. Same as above."

  # --------------------------------------------------------------------------
  # IMPLEMENT: batch job processing histogram
  #   Export from scripts/batch_process_all_datasets.py or pipeline run()
  #   _prom_batch_seconds = Histogram("har_batch_processing_seconds", ...)
  # --------------------------------------------------------------------------
  - name: har_batch_health_pending
    interval: 5m
    rules:
      # DEAD: har_batch_processing_seconds_bucket not exported
      - alert: HARSlowBatchProcessing__PENDING
        expr: histogram_quantile(0.95, rate(har_batch_processing_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
          team: ml-ops
          status: pending_metric
        annotations:
          summary: "[PENDING] Batch processing p95 > 60s"
          description: "Requires har_batch_processing_seconds Histogram. Implement: time run_pipeline.py stage loop."
