# HAR Pipeline Alert Rules — LIVE RULES ONLY
# ==============================================
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║  ALL rules in this file reference metrics ACTUALLY exported    ║
# ║  by src/api/app.py at GET /metrics.                            ║
# ║                                                                 ║
# ║  Verified metric inventory (app.py lines 44-76):              ║
# ║    Counter:   har_api_requests_total                           ║
# ║    Gauge:     har_confidence_mean                              ║
# ║    Gauge:     har_entropy_mean                                 ║
# ║    Gauge:     har_flip_rate                                    ║
# ║    Gauge:     har_drift_detected  (0.0=PASS, 1.0=WARNING)     ║
# ║    Gauge:     har_baseline_age_days  (-1 = file missing)      ║
# ║    Histogram: har_inference_latency_ms  (_bucket/_sum/_count) ║
# ║                                                                 ║
# ║  Rules for metrics not yet exported → har_alerts_pending.yml  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Threshold alignment (single source of truth → config_entity.py):
#   confidence_warn_threshold = 0.60  (PostInferenceMonitoringConfig)
#   trigger confidence_warn   = 0.65  (TriggerEvaluationConfig — higher tier)
#   entropy_warn              = 1.8   (TriggerThresholds)
#   flip_rate_warn            = 0.25  (TriggerThresholds — fraction not %)
#   baseline_max_age_days     = 90    (PostInferenceMonitoringConfig)

groups:

  # --------------------------------------------------------------------------
  # Group 1: Model health — per-batch monitoring gauges
  # Updated on every /api/upload call via _run_monitoring()
  # --------------------------------------------------------------------------
  - name: har_model_health
    interval: 1m
    rules:
      - alert: HARLowConfidence
        expr: har_confidence_mean < 0.65
        for: 5m
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR model confidence is low"
          description: "Mean confidence {{ $value | printf \"%.3f\" }} < 0.65 for 5m. (PostInferenceMonitoringConfig.confidence_warn_threshold=0.60; trigger fires at 0.65)"
          runbook: "Check for data drift or model degradation. Consider --retrain."

      - alert: HARHighEntropy
        expr: har_entropy_mean > 1.8
        for: 5m
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR model prediction entropy is high"
          description: "Mean normalised entropy {{ $value | printf \"%.3f\" }} > 1.8 (TriggerThresholds.entropy_warn). Model is uncertain across activity classes."

      - alert: HARHighFlipRate
        # har_flip_rate is stored as fraction (transition_rate / 100). Threshold 0.25 = 25%
        expr: har_flip_rate > 0.25
        for: 10m
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR prediction flip rate is high"
          description: "Activity flip rate {{ $value | printf \"%.3f\" }} > 0.25 for 10m. Model may be oscillating between classes."

  # --------------------------------------------------------------------------
  # Group 2: Drift detection — Layer 3 z-score result
  # har_drift_detected is a label-free Gauge: 0.0=PASS, 1.0=WARNING
  # Bug fix: removed {drift_type="overall"} filter — gauge has no labels
  # --------------------------------------------------------------------------
  - name: har_drift_detection
    interval: 1m
    rules:
      - alert: HARDriftDetected
        expr: har_drift_detected == 1
        for: 5m
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR Layer 3 z-score drift WARNING raised"
          description: "At least one sensor channel exceeds drift_zscore_threshold=2.0 std deviations from the training baseline for 5m."
          runbook: "1. Review Stage 6 monitoring_report.json for drifted channels. 2. Consider --retrain --update-baseline."

  # --------------------------------------------------------------------------
  # Group 3: Service availability
  # har_api_requests_total (Counter), har_inference_latency_ms (Histogram)
  # --------------------------------------------------------------------------
  - name: har_service_health
    interval: 30s
    rules:
      # histogram_quantile needs the _bucket time series; unit = milliseconds
      - alert: HARHighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(har_inference_latency_ms_bucket[5m]))) > 500
        for: 5m
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR inference p95 latency exceeds 500ms SLA"
          description: "p95 latency = {{ $value | printf \"%.1f\" }}ms (> 500ms). Check CPU load, batch size, and preprocessing cost."

      - alert: HARNoPredictions
        expr: rate(har_api_requests_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
          team: ml-ops
        annotations:
          summary: "HAR inference service idle — no requests for 10 minutes"
          description: "rate(har_api_requests_total[5m]) == 0 for 10m. Service may be down or scrape target unreachable."
          runbook: "curl http://inference:8000/health — verify service UP and Prometheus target is green."

  # --------------------------------------------------------------------------
  # Group 4: Baseline governance
  # har_baseline_age_days Gauge: -1=missing, 0+=fractional days since mtime
  # Updated on every /api/upload call in _run_monitoring()
  # --------------------------------------------------------------------------
  - name: har_baseline_governance
    interval: 1h
    rules:
      - alert: HARStaleDriftBaseline
        expr: har_baseline_age_days > 90
        for: 1h
        labels:
          severity: warning
          team: ml-ops
        annotations:
          summary: "HAR drift baseline is stale ({{ $value | printf \"%.0f\" }} days old)"
          description: "models/normalized_baseline.json is {{ $value | printf \"%.0f\" }}d old. Limit: PostInferenceMonitoringConfig.max_baseline_age_days=90. Layer 3 scores computed vs stale reference."
          runbook: "Run: python run_pipeline.py --retrain --update-baseline"

      - alert: HARMissingDriftBaseline
        expr: har_baseline_age_days == -1
        for: 5m
        labels:
          severity: critical
          team: ml-ops
        annotations:
          summary: "HAR drift baseline file missing — Layer 3 silently disabled"
          description: "models/normalized_baseline.json not found. Layer 3 z-score drift check is skipped on every request."
          runbook: "Run: python run_pipeline.py --stages baseline_update --update-baseline"
