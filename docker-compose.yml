# ============================================================================
# Docker Compose for HAR MLOps Pipeline
# ============================================================================
# This file orchestrates all services for the MLOps pipeline:
#   - MLflow tracking server
#   - HAR inference API
#   - Training environment (on-demand)
#
# Usage:
#   Start all services:     docker-compose up -d
#   Start specific service: docker-compose up -d mlflow
#   View logs:              docker-compose logs -f
#   Stop all:               docker-compose down
#
# Author: MLOps Pipeline
# Date: December 11, 2025
# ============================================================================

services:
  # ==========================================================================
  # MLflow Tracking Server
  # ==========================================================================
  mlflow:
    image: python:3.11-slim
    container_name: har-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./models:/mlflow/models
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server --backend-store-uri sqlite:///mlflow.db
                             --default-artifact-root /mlflow/mlruns
                             --host 0.0.0.0
                             --port 5000"
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - har-network

  # ==========================================================================
  # HAR Inference API (FastAPI)
  # ==========================================================================
  inference:
    build:
      context: .
      dockerfile: docker/Dockerfile.inference
    container_name: har-inference
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - MODEL_PATH=/app/models/pretrained/fine_tuned_model_1dcnnbilstm.keras
      - CONFIG_PATH=/app/config/pipeline_config.yaml
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - har-network

  # ==========================================================================
  # Training Service (on-demand)
  # ==========================================================================
  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    container_name: har-training
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
      - ./logs:/app/logs
      - ./config:/app/config
      - ./src:/app/src
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app/src
    depends_on:
      - mlflow
    # This service is meant to be run on-demand, not always running
    profiles:
      - training
    networks:
      - har-network

  # ==========================================================================
  # Data Preprocessing Service (on-demand)
  # ==========================================================================
  preprocessing:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    container_name: har-preprocessing
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./src:/app/src
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app/src
    command: python src/sensor_data_pipeline.py
    profiles:
      - preprocessing
    networks:
      - har-network

  # ==========================================================================
  # Prometheus Metrics Scraper
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: har-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      - inference
      - alertmanager
    networks:
      - har-network
    restart: unless-stopped

  # ==========================================================================
  # Alertmanager — receives alerts from Prometheus, routes to receivers
  # UI: http://localhost:9093
  # Config: config/alertmanager.yml
  # ==========================================================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: har-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.advertise-address=0.0.0.0:9093'
      - '--web.listen-address=0.0.0.0:9093'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - har-network
    restart: unless-stopped

  # ==========================================================================
  # Grafana Dashboard
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.3.1
    container_name: har-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    depends_on:
      - prometheus
    networks:
      - har-network
    restart: unless-stopped

# ==========================================================================
# Networks
# ==========================================================================
networks:
  har-network:
    driver: bridge
    name: har-mlops-network

# ==========================================================================
# Volumes (for data persistence)
# ==========================================================================
volumes:
  mlflow-data:
    name: har-mlflow-data
  model-data:
    name: har-model-data
  prometheus_data:
    name: har-prometheus-data
  grafana_data:
    name: har-grafana-data
  alertmanager_data:
    name: har-alertmanager-data
